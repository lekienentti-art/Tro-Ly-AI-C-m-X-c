name: Đúc APK Tự Động

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy Code về Lò
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt Java 17 (Cốt lõi Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Nạp linh kiện Linux (Chống lỗi GTK 3.0)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Cài đặt Flutter & Ký Giấy Phép Android
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: yes | flutter doctor --android-licenses

      - name: Cài đặt Thư Viện (Luật Rừng: Flet cài cuối)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet --upgrade

      - name: ÉP KHUÔN APK (Tắt màu mè, cấm hỏi han Y/N)
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
          CI: "true"
        run: flet build apk

      - name: Trả Hàng (Lưu file APK)
        uses: actions/upload-artifact@v4
        with:
          name: App_Kienentti_APK
          path: build/apk/**/*.apk
