name: Đúc APK Tự Động

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Lấy Code về Lò
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt Java (Đe sắt)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Chữa bệnh thiếu linh kiện Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Cài đặt Búa Máy Flutter (Bản chuẩn)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      - run: yes | flutter doctor --android-licenses

      - name: Nạp FLET BẢN VÀNG (0.23.2)
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.23.2
          pip install -r requirements.txt

      - name: ÉP KHUÔN APK (Trơn tru)
        run: flet build apk

      - name: Trả Hàng (Lưu file APK)
        uses: actions/upload-artifact@v4
        with:
          name: App_Kienentti_APK
          path: build/apk/**/*.apk
