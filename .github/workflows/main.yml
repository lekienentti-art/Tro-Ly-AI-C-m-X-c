name: Đúc APK Tự Động

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy Code về Lò
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt Java (Búa máy Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cài đặt Flutter & Ký Giấy Phép
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: yes | flutter doctor --android-licenses

      - name: LẬT NGƯỢC THẾ CỜ (Cài thư viện chuẩn)
        run: |
          python -m pip install --upgrade pip
          # Cài đồ của sếp trước
          pip install -r requirements.txt
          # Cài Flet bản mới nhất đè lên sau cùng để bảo vệ hệ thống
          pip install flet --upgrade

      - name: ÉP KHUÔN APK (Tắt cảnh báo, chạy êm ru)
        env:
          CI: "true"
        run: flet build apk

      - name: Trả Hàng (Lưu file APK)
        uses: actions/upload-artifact@v4
        with:
          name: App_Kienentti_APK
          path: build/apk/**/*.apk
