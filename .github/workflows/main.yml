name: Đúc APK Tự Động

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy Code về Lò
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chữa bệnh thiếu linh kiện Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Nạp nhiên liệu (Thư viện)
        run: |
          python -m pip install --upgrade pip
          pip install flet
          pip install -r requirements.txt

      - name: ÉP KHUÔN APK (Lột mặt nạ Flet)
        run: bash -c "yes | flet build apk --verbose"

      - name: Trả Hàng (Lưu file APK)
        uses: actions/upload-artifact@v4
        with:
          name: App_Kienentti_APK
          path: build/apk/**/*.apk
