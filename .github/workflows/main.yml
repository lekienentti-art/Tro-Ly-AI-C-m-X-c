name: Đúc APK Tự Động

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy Code về Lò
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt Java (Búa máy Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Chữa bệnh thiếu linh kiện Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Nạp ĐÚNG CHUẨN bản Flutter 3.41.2 & Ký giấy phép
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      - run: yes | flutter doctor --android-licenses

      - name: Nạp nhiên liệu (Thư viện)
        run: |
          python -m pip install --upgrade pip
          pip install flet
          pip install -r requirements.txt

      - name: ÉP KHUÔN APK (Bọc thép 100%)
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
          PYTHONIOENCODING: "utf-8"
        run: flet build apk

      - name: Trả Hàng (Lưu file APK)
        uses: actions/upload-artifact@v4
        with:
          name: App_Kienentti_APK
          path: build/apk/**/*.apk
