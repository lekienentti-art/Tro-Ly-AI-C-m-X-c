name: Đúc APK Tự Động

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy Code về Lò
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt Java (Búa máy Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Chữa bệnh thiếu linh kiện Linux (Bắt buộc phải có)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Cài đặt Flutter & Ký Giấy Phép
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: yes | flutter doctor --android-licenses

      - name: LẬT NGƯỢC THẾ CỜ (Cài thư viện chuẩn)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet --upgrade

      - name: ÉP KHUÔN APK (Khóa mõm làm màu, chạy êm ru)
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: flet build apk

      - name: Trả Hàng (Lưu file APK)
        uses: actions/upload-artifact@v4
        with:
          name: App_Kienentti_APK
          path: build/apk/**/*.apk
